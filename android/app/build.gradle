apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * FaceShield Edge — Android build.gradle
 *
 * Key additions vs stock RN template:
 *  - TensorFlow Lite + NNAPI delegate
 *  - react-native-vision-camera frame processor support
 *  - aaptOptions to prevent compression of .tflite model assets
 */

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.faceshieldedge"

    defaultConfig {
        applicationId "com.faceshieldedge"
        minSdkVersion rootProject.ext.minSdkVersion   // 26 (Android 8.0)
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"

        // Required for TFLite NNAPI delegate on older devices
        ndk {
            abiFilters "armeabi-v7a", "arm64-v8a", "x86", "x86_64"
        }
    }

    // Prevent Metro from compressing TFLite model files
    // (compressed assets cannot be memory-mapped, breaking TFLite)
    aaptOptions {
        noCompress "tflite", "lite", "task"
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            minifyEnabled true
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    // React Native
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    // ── TensorFlow Lite ────────────────────────────────────────
    // Core TFLite runtime
    implementation("org.tensorflow:tensorflow-lite:2.14.0")
    // NNAPI delegate — hardware neural network acceleration (Android 8.1+)
    implementation("org.tensorflow:tensorflow-lite-gpu-delegate-plugin:0.4.4")
    implementation("org.tensorflow:tensorflow-lite-task-vision:0.4.4")

    // GPU delegate (fallback — optional)
    implementation("org.tensorflow:tensorflow-lite-gpu:2.14.0")

    // ── VisionCamera ───────────────────────────────────────────
    // Frame processor plugin support
    implementation("com.mrousavy.camera:react-native-vision-camera:3.+")

    // ── Android Keystore / Security ────────────────────────────
    // Keystore is built into Android SDK — no extra dep needed

    // ── Core Android ──────────────────────────────────────────
    implementation("androidx.camera:camera-core:1.3.1")
    implementation("androidx.camera:camera-camera2:1.3.1")
}

// ProGuard rules for TFLite (keep model classes from being stripped)
// See proguard-rules.pro
